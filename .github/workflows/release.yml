name: Release

on:
  push:
    tags:
      - "v*"
      - "test-v*"
  pull_request:

permissions: write-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UBUNTU_CODENAME: noble
  UBUNTU_VERSION: "24.04"
  DOCKER_VERSION: "29.5.2"
  NERDCTL_VERSION: "2.3.1"
  FLANNEL_VERSION: "1.9.1-flannel1"
  FLANNEL_MINI_VERSION: "1.9.1"
  BINFMT_VERSION: "deploy/v7.0.0-28"
  BINFMT_QEMU_VERSION: "7.0.0"

jobs:
  build:
    strategy:
      max-parallel: 2
      fail-fast: true
      matrix:
        arch: [x86_64, aarch64]
        runtime: [none, docker, containerd, incus]
        include:
          - arch: x86_64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.arch }}-${{ matrix.runtime }}
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build
        run: |
          make image OS_ARCH=${{ matrix.arch }} \
            UBUNTU_CODENAME="${UBUNTU_CODENAME}" \
            UBUNTU_VERSION="${UBUNTU_VERSION}" \
            DOCKER_VERSION="${DOCKER_VERSION}" \
            BINFMT_VERSION="${BINFMT_VERSION}" \
            BINFMT_QEMU_VERSION="${BINFMT_QEMU_VERSION}" \
            RUNTIME=${{ matrix.runtime }}
          ls -lah dist/img

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: img-${{ matrix.arch }}-${{ matrix.runtime }}
          path: dist/img/*-${{ matrix.runtime }}.*
          overwrite: true
          retention-days: 1
          compression-level: 0

  release:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      actions: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          path: dist/img

      - name: Create
        run: >
          tag="${GITHUB_REF##*/}"

          gh release create "${tag}" --draft --title "${tag}" dist/img/*/*.raw.gz dist/img/*/*.sha512sum

      - name: Delete build artifacts
        if: always()
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[].id' | xargs -r -I {} gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/{}

